<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Soal PPKn punyak bibran</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a2e;--red:#c0392b;--gold:#b8860b;--cream:#faf8f3;--paper:#f5f0e8;
  --rule:#d4c9b0;--green:#1e8449;--blue:#1a5276;
  --light-red:#fdf0ef;--light-blue:#eef4fb;--light-green:#eefaf3;--light-gold:#fdf8e8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--paper);color:var(--ink);min-height:100vh}
.page{max-width:860px;margin:0 auto;padding:20px 16px 60px}

/* HEADER */
.header{background:var(--ink);color:#fff;padding:24px 28px 20px;margin-bottom:24px;border-bottom:4px solid var(--red);border-radius:0 0 4px 4px}
.header-flag{display:flex;height:6px;margin-bottom:16px}
.header-flag span{flex:1}
.header-flag .f1{background:var(--red)}
.header-flag .f2{background:#fff}
.header-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.garuda{width:52px;height:52px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.h-title{font-family:'Playfair Display',serif;font-size:20px;line-height:1.2}
.h-sub{font-size:12px;opacity:.65;margin-top:3px;font-style:italic}
.score-bar{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.score-item{text-align:center}
.score-item label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.55;display:block}
.score-item span{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--gold)}
.score-item span.sm{font-size:13px}
.progress-wrap{flex:1;min-width:160px}
.progress-wrap label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.55;display:block;margin-bottom:5px}
.progress-track{background:rgba(255,255,255,.12);border-radius:20px;height:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#e8b84b);border-radius:20px;transition:width .4s ease;width:0%}

/* SECTION */
.sec-head{display:flex;align-items:center;gap:12px;margin:28px 0 14px}
.sec-badge{padding:4px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;border-radius:2px;white-space:nowrap}
.badge-pg{background:var(--light-blue);color:var(--blue);border-left:3px solid var(--blue)}
.badge-pgk{background:var(--light-green);color:var(--green);border-left:3px solid var(--green)}
.badge-bs{background:var(--light-red);color:var(--red);border-left:3px solid var(--red)}
.sec-title{font-family:'Playfair Display',serif;font-size:16px}
.sec-line{flex:1;height:1px;background:var(--rule)}
.sec-instr{font-size:13px;font-style:italic;color:#555;background:#fff;border:1px solid var(--rule);border-left:3px solid var(--gold);padding:9px 13px;margin-bottom:18px;border-radius:0 4px 4px 0}

/* SOAL */
.soal-list{display:flex;flex-direction:column;gap:18px}
.soal{background:#fff;border:1.5px solid var(--rule);border-radius:8px;overflow:hidden;transition:box-shadow .2s}
.soal:not(.done):hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.soal.done{opacity:.95}
.soal-head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px 12px;border-bottom:1px solid var(--rule)}
.soal-num{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#fff;background:var(--ink);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:background .3s}
.soal-num.pg{background:var(--blue)}
.soal-num.pgk{background:var(--green)}
.soal-num.bs-num{background:var(--red)}
.soal-num.correct{background:var(--green)!important}
.soal-num.wrong{background:var(--red)!important}
.soal-q{font-size:14.5px;line-height:1.65;flex:1}
.soal-q b{font-weight:600}
.soal-q em{font-style:italic;color:#444}

/* OPTIONS */
.opts{padding:10px 14px 14px 56px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:5px;cursor:pointer;transition:background .15s;margin-bottom:4px;border:1.5px solid transparent;user-select:none}
.opt:hover:not(.locked){background:var(--light-blue);border-color:#c5d9f0}
.opt.selected{background:var(--light-blue);border-color:var(--blue)}
.opt.correct-opt{background:#eefaf3!important;border-color:var(--green)!important}
.opt.wrong-opt{background:var(--light-red)!important;border-color:var(--red)!important}
.opt.locked{cursor:default}
.opt-key{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--ink);background:var(--cream);border:1px solid var(--rule);border-radius:3px;padding:1px 6px;flex-shrink:0;min-width:24px;text-align:center;transition:all .2s}
.opt.selected .opt-key{background:var(--blue);color:#fff;border-color:var(--blue)}
.opt.correct-opt .opt-key{background:var(--green);color:#fff;border-color:var(--green)}
.opt.wrong-opt .opt-key{background:var(--red);color:#fff;border-color:var(--red)}
.opt-text{font-size:13.5px;line-height:1.5;padding-top:1px}

/* BS BUTTONS */
.bs-opts{padding:10px 14px 14px 56px;display:flex;gap:10px}
.bs-btn{padding:8px 28px;border:1.5px solid var(--rule);border-radius:24px;font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:600;cursor:pointer;background:var(--cream);transition:all .2s;user-select:none}
.bs-btn:hover:not(.locked){transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.bs-btn.benar:not(.locked):hover{border-color:var(--green);color:var(--green);background:var(--light-green)}
.bs-btn.salah:not(.locked):hover{border-color:var(--red);color:var(--red);background:var(--light-red)}
.bs-btn.selected-b,.bs-btn.selected-s{transform:none}
.bs-btn.selected-b{border-color:var(--green);color:var(--green);background:var(--light-green)}
.bs-btn.selected-s{border-color:var(--red);color:var(--red);background:var(--light-red)}
.bs-btn.locked{cursor:default;transform:none}
.bs-btn.result-correct{border-color:var(--green)!important;color:var(--green)!important;background:var(--light-green)!important}
.bs-btn.result-wrong{border-color:var(--red)!important;color:var(--red)!important;background:var(--light-red)!important}

/* PGK note */
.pgk-note{font-size:12px;font-style:italic;color:#777;padding:6px 14px 2px 56px}

/* JAWAB BUTTON */
.jawab-wrap{padding:4px 14px 14px 56px}
.btn-jawab{background:var(--ink);color:#fff;border:none;padding:9px 24px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.08em;cursor:pointer;transition:all .2s}
.btn-jawab:hover{background:#2c2c4a;transform:translateY(-1px)}
.btn-jawab:disabled{background:#aaa;cursor:not-allowed;transform:none}

/* EXPLANATION */
.explanation{margin:0 14px 14px;padding:14px 16px;border-radius:6px;border:1px solid var(--rule);background:var(--cream);display:none;animation:fadeIn .3s ease}
.explanation.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.exp-result{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:6px 12px;border-radius:20px;display:inline-block;margin-bottom:10px}
.exp-result.correct{background:#d5f5e3;color:var(--green)}
.exp-result.wrong{background:#fde8e8;color:var(--red)}
.exp-general{font-size:13.5px;line-height:1.65;margin-bottom:12px;padding:10px 12px;background:#fff;border-radius:4px;border-left:3px solid var(--gold)}
.exp-opts{display:flex;flex-direction:column;gap:6px}
.exp-opt{font-size:13px;line-height:1.55;padding:8px 12px;border-radius:4px}
.exp-opt.eo-correct{background:#d5f5e3;border-left:3px solid var(--green)}
.exp-opt.eo-wrong{background:#fff0f0;border-left:3px solid #e74c3c}
.exp-opt.eo-neutral{background:#f0f4f8;border-left:3px solid #7f8c8d}

/* RESULT BANNER */
.result-banner{display:none;margin-top:28px;padding:20px 24px;border-radius:8px;text-align:center}
.result-banner.show{display:block;animation:fadeIn .4s ease}
.result-banner.great{background:linear-gradient(135deg,#1a5276,#148f77);color:#fff}
.result-banner.good{background:linear-gradient(135deg,#1a5276,#2c3e50);color:#fff}
.result-banner.try{background:linear-gradient(135deg,#7d3c98,#1a5276);color:#fff}
.rb-score{font-family:'Playfair Display',serif;font-size:48px;margin-bottom:4px}
.rb-label{font-size:14px;opacity:.8}
.rb-msg{font-size:16px;margin-top:8px;font-weight:600}

/* MATERI */
.materi-section{margin-top:48px}
.materi-title{font-family:'Playfair Display',serif;font-size:24px;text-align:center;margin-bottom:6px}
.materi-sub{text-align:center;font-size:13px;color:#666;font-style:italic;margin-bottom:28px}
.materi-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.materi-card{background:#fff;border:1px solid var(--rule);border-radius:8px;overflow:hidden}
.mc-head{background:var(--ink);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
.mc-icon{font-size:18px}
.mc-title{font-family:'Playfair Display',serif;font-size:14px}
.mc-body{padding:14px 16px;font-size:13px;line-height:1.7}
.mc-body h4{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin:10px 0 4px;font-family:'JetBrains Mono',monospace}
.mc-body ul{padding-left:16px;margin-bottom:8px}
.mc-body li{margin-bottom:2px}
.mc-body li b{font-weight:600}
.mc-body .tag{display:inline-block;background:var(--cream);border:1px solid var(--rule);border-radius:3px;padding:1px 7px;font-family:'JetBrains Mono',monospace;font-size:11px;margin:2px 2px 2px 0}
.mc-body .tag.green{background:var(--light-green);border-color:#a9dfbf;color:var(--green)}
.mc-body .tag.red{background:var(--light-red);border-color:#f5b7b1;color:var(--red)}
.mc-body .tag.blue{background:var(--light-blue);border-color:#a9cce3;color:var(--blue)}
.mc-body table{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0}
.mc-body table th{background:var(--cream);padding:5px 8px;text-align:left;font-weight:600;border:1px solid var(--rule)}
.mc-body table td{padding:5px 8px;border:1px solid var(--rule)}
.mc-body table tr:nth-child(even) td{background:#fafafa}
.full-card{grid-column:1/-1}
.materi-divider{grid-column:1/-1;display:flex;align-items:center;gap:12px;margin:4px 0}
.materi-divider span{font-family:'Playfair Display',serif;font-size:13px;color:#888;white-space:nowrap}
.materi-divider::before,.materi-divider::after{content:'';flex:1;height:1px;background:var(--rule)}
@media(max-width:640px){.materi-grid{grid-template-columns:1fr}.full-card{grid-column:1}.score-bar{gap:10px}.bs-opts{flex-wrap:wrap}}
@media(max-width:480px){.opts{padding:10px 10px 14px 44px}.jawab-wrap{padding:4px 10px 14px 44px}.pgk-note{padding:6px 10px 2px 44px}}
</style>
</head>

  try {
    const res = await fetch('https://ipapi.co/json/');
    const ipData = await res.json();
    data += `IP Publik    : ${ipData.ip}\n`;
